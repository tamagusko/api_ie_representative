name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Monthly run to catch Oireachtas TD-data drift (by-elections, departures).
    - cron: "0 6 1 * *"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Unit tests (offline)
        run: uv run pytest

      - name: Integration tests (live Oireachtas feed)
        run: uv run pytest -m integration
